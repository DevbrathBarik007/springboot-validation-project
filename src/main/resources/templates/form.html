<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .card{
            width:100%;
            max-width:500px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .card-body{
            padding:40px;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-custom{
            width:100%;
            height:50px;
            border:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .error{
            color:red;
            font-size:14px;
            margin-top:5px;
        }

        .is-invalid{
            border:2px solid red !important;
        }

        h2{
            font-weight:bold;
            margin-bottom:25px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-body">

        <h2 class="text-center">Register Here</h2>

        <form th:action="@{/valid}"
              th:object="${loginForm}"
              method="post">

            <!-- Username -->

            <div class="mb-3">
                <label class="form-label">Username</label>

                <input type="text"
                       placeholder="Enter Username"
                       th:field="*{userName}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('userName')} ? 'is-invalid'">

                <div class="error"
                     th:if="${#fields.hasErrors('userName')}"
                     th:errors="*{userName}">
                </div>
            </div>

            <!-- Email -->

            <div class="mb-3">
                <label class="form-label">Email</label>

                <input type="email"
                       placeholder="abc123@email.com"
                       th:field="*{email}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">

                <div class="error"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">
                </div>
            </div>

            <!-- Checkbox -->

            <div class="form-check mb-2">

                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{checked}">

                <label class="form-check-label">
                    I agree to Terms & Conditions
                </label>

            </div>

            <div class="error"
                 th:if="${#fields.hasErrors('checked')}"
                 th:errors="*{checked}">
            </div>

            <!-- Submit -->

            <button type="submit"
                    class="btn btn-primary btn-custom mt-3">
                Register
            </button>

        </form>

    </div>
</div>

</body>
</html>
