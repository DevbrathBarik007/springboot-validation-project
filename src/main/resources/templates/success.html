<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            padding:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            font-family:Arial, sans-serif;
        }

        .success-card{
            background:white;
            padding:40px;
            width:500px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            animation:fadeIn 0.8s ease-in-out;
        }

        .success-icon{
            font-size:70px;
            color:green;
        }

        h1{
            color:#333;
            margin-top:15px;
            margin-bottom:20px;
        }

        .info-box{
            background:#f8f9fa;
            padding:15px;
            border-radius:10px;
            margin-top:15px;
            text-align:left;
        }

        .label{
            font-weight:bold;
            color:#555;
        }

        .value{
            color:#0d6efd;
            font-size:18px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="success-card">

    <div class="success-icon">✔</div>

    <h1>Welcome To This Page</h1>

    <div class="info-box">
        <p>
            <span class="label">Username:</span>
            <span class="value" th:text="${loginForm.userName}"></span>
        </p>

        <p>
            <span class="label">Email:</span>
            <span class="value" th:text="${loginForm.email}"></span>
        </p>
    </div>

    <a th:href="@{/}" class="btn btn-primary mt-3">
        Back To Form
    </a>

</div>
<h2 class="text-bottom">Thank for Login</h2>
</body>
</html>
